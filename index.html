<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Management</title>
  <style>
    :root {
      --bg: #f4f2ee;
      --card: #ffffff;
      --ink: #1e2420;
      --ink-soft: #5b6660;
      --line: #e3ddd2;
      --accent: #1f6f5c;
      --accent-dark: #164e42;
      --gold: #c08a2e;
      --danger: #b5473f;
      --danger-soft: #f6e4e2;
      --amber-soft: #faf0da;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
    }
    #app { max-width: 1080px; margin: 0 auto; padding: 20px 16px 60px; }
  
    .brandbar { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
    .brand-name {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600;
      font-size: 28px;
      border: none;
      background: none;
      color: var(--ink);
      padding: 2px 4px;
      border-radius: 6px;
      max-width: 60%;
    }
    .brand-name:focus { outline: 2px solid var(--accent); background: #fff; }
    .tagline { color: var(--ink-soft); font-size: 13px; letter-spacing: .03em; }
  
    nav.tabs { display: flex; gap: 6px; margin: 18px 0 20px; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
    nav.tabs button {
      border: none;
      background: none;
      padding: 10px 14px;
      font-size: 14.5px;
      font-weight: 600;
      color: var(--ink-soft);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-family: inherit;
    }
    nav.tabs button.active { color: var(--accent-dark); border-bottom-color: var(--accent); }
    nav.tabs button .badge {
      background: var(--danger);
      color: #fff;
      border-radius: 20px;
      font-size: 11px;
      padding: 1px 6px;
      margin-left: 6px;
      font-weight: 700;
    }
  
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    input[type=text], input[type=number], input[type=search], select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: var(--ink);
    }
    input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    .search { flex: 1; min-width: 180px; }
  
    button.primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }
    button.primary:hover { background: var(--accent-dark); }
    button.ghost {
      background: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13.5px;
      cursor: pointer;
      color: var(--ink);
      font-family: inherit;
    }
    button.ghost:hover { border-color: var(--accent); color: var(--accent-dark); }
    button.link {
      background: none;
      border: none;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      padding: 0;
    }
    button.link:hover { text-decoration: underline; color: var(--accent-dark); }
    button:disabled { opacity: .45; cursor: not-allowed; }
  
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.04);
    }
    .card-head { display: flex; align-items: center; gap: 14px; }
    .item-name { font-family: 'Fraunces', Georgia, serif; font-size: 18px; font-weight: 600; line-height: 1.25; }
    .price-tag {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--amber-soft);
      color: var(--gold);
      border: 1px solid #ecd9ad;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 12.5px;
      font-weight: 600;
      white-space: nowrap;
      display: inline-block;
    }
    .total-stock { font-size: 13px; color: var(--ink-soft); }
    .total-stock b { color: var(--ink); }
  
    .thumb { border-radius: 8px; object-fit: cover; border: 1px solid var(--line); flex-shrink: 0; background: #f2f0eb; }
    .thumb-placeholder {
      border-radius: 8px;
      background: var(--amber-soft);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      flex-shrink: 0;
    }
  
    /* Simplified Color Swatches Row */
    .card-swatches { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
    .swatch-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.15); display: inline-block; }
    .swatch-wrapper { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--ink-soft); background: #faf9f6; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--line); }

    /* Collapsible stock breakdown panel */
    .breakdown-toggle-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; border-top: 1px solid var(--line); margin-top: 4px; padding-top: 8px; background: none; border-left: none; border-right: none; border-bottom: none; cursor: pointer; color: var(--accent); font-weight: 600; font-size: 13px; font-family: inherit; text-align: left; }
    .breakdown-toggle-btn::after { content: '▾'; font-size: 10px; margin-left: 4px; }
    .breakdown-toggle-btn.expanded::after { content: '▴'; }
    .breakdown-panel { display: none; background: #faf9f6; border-radius: 8px; padding: 8px 12px; font-size: 13px; border: 1px solid var(--line); }
    .breakdown-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed var(--line); }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-row .dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); margin-right: 6px; display: inline-block; }

    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: auto; padding-top: 8px; }
    .card-actions button { flex: 1; min-width: 60px; padding: 8px 10px; font-size: 13px; }
  
    .empty { text-align: center; padding: 60px 20px; color: var(--ink-soft); }
    .empty h3 { font-family: 'Fraunces', Georgia, serif; color: var(--ink); font-size: 20px; margin-bottom: 6px; }
  
    /* Form Layout Elements */
    .form-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; max-width: 600px; }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink-soft);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .field input[type=text], .field input[type=number], .field select { width: 100%; }
    
    /* Dropdown Variant Form Rows */
    .color-group {
      background: #faf9f6;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .color-group-header {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .color-group-header input[type=color] {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 2px;
      background: #fff;
    }
    .color-group-header input[type=text] { flex: 1; }
    
    .size-adder-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
      background: #f0ede6;
      padding: 6px 10px;
      border-radius: 6px;
    }
    .size-adder-row select { width: auto; padding: 5px 8px; font-size: 13px; }
    
    .added-sizes-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }
    .added-size-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 1px solid var(--line);
      padding: 6px 10px;
      border-radius: 6px;
    }
    .added-size-name { font-weight: 600; font-size: 13px; width: 60px; }
    .added-size-row input[type=number] { padding: 4px 8px; max-width: 90px; font-size: 13px; }

    .form-actions { display: flex; gap: 10px; margin-top: 16px; }
    .photo-row { display: flex; gap: 12px; align-items: center; }
  
    /* Modal styles */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(20,20,15,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
    }
    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      max-width: 440px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h3 { font-family: 'Fraunces', Georgia, serif; margin: 0; font-size: 20px; }
    .modal-title-row { display: flex; gap: 10px; align-items: center; margin-bottom: 4px; }
    .modal .sub { color: var(--ink-soft); font-size: 13px; margin-bottom: 16px; }

    /* Beautiful, Horizontal Modal Selectors */
    .modal-swatches { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; margin-top: 4px; }
    .modal-swatch-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fff;
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 500;
      font-family: inherit;
      color: var(--ink);
    }
    .modal-swatch-btn.active {
      border-color: var(--accent);
      background: #f0f7f5;
      outline: 2px solid var(--accent);
    }
    
    .modal-sizes { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; margin-top: 4px; }
    .modal-size-btn {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      text-align: center;
      min-width: 60px;
      color: var(--ink);
    }
    .modal-size-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .modal-size-btn.disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
      background: #faf9f6;
    }
    .modal-size-btn .qty-label {
      display: block;
      font-size: 10px;
      font-weight: normal;
      margin-top: 2px;
      opacity: 0.7;
    }
    .modal-size-btn.active .qty-label {
      opacity: 0.9;
    }
  
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    th {
      text-align: left;
      color: var(--ink-soft);
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
    }
    td { padding: 9px 10px; border-bottom: 1px solid var(--line); }
    tr:last-child td { border-bottom: none; }
    .log-wrap { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); overflow-x: auto; }
  
    .toast {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent-dark);
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      z-index: 100;
      box-shadow: 0 6px 20px rgba(0,0,0,.2);
    }
    .toast.error { background: var(--danger); }
    .loading { text-align: center; padding: 60px; color: var(--ink-soft); }
    .footer-note { text-align: center; color: var(--ink-soft); font-size: 12px; margin-top: 36px; }
  </style>
</head>
<body>

<div id="app"><div class="loading">Loading cloud inventory sync…</div></div>
  
<script>
const FIREBASE_DB_URL = "https://clothing-inventory-dc4f3-default-rtdb.asia-southeast1.firebasedatabase.app/";

let state = { 
  items: [], 
  log: [], 
  brand: 'My Clothing Brand', 
  tab: 'inventory', 
  search: '', 
  ready: false,
  _editingId: null, 
  _pendingImage: null, 
  _removePhoto: false 
};

let modal = null;
let toastMsg = null, toastTimer = null;
  
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

const REGULAR_SIZES = ['S', 'M', 'L', 'XL', 'XXL', 'XXXL', 'Free size'];
const DENIM_SIZES = ['28', '30', '32', '34', '36', '38', '40'];

function esc(s){ 
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); 
}

async function cloudFetch(path) {
  try {
    const res = await fetch(`${FIREBASE_DB_URL}${path}.json`);
    return await res.json();
  } catch (e) {
    console.error("Fetch error:", e);
    return null;
  }
}

async function cloudPut(path, data) {
  try {
    await fetch(`${FIREBASE_DB_URL}${path}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  } catch (e) {
    showToast('Network error syncing to database', true);
  }
}
  
async function syncFromCloud(isBackground = false){
  if(isBackground && (modal !== null || document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT')) {
    return; 
  }

  const rawItems = await cloudFetch('items');
  const items = [];
  if (rawItems) {
    Object.keys(rawItems).forEach(id => {
      if (rawItems[id]) items.push(rawItems[id]);
    });
  }
  state.items = items;
  
  const rawLog = await cloudFetch('log');
  const log = [];
  if (rawLog) {
    Object.keys(rawLog).forEach(id => {
      if (rawLog[id]) log.push(rawLog[id]);
    });
  }
  state.log = log.sort((a,b) => a.time - b.time);
  
  const rawBrand = await cloudFetch('brand');
  state.brand = typeof rawBrand === 'string' ? rawBrand : 'My Clothing Brand';
  
  state.ready = true;
  render();
}
  
function showToast(msg, isError){
  toastMsg = {msg, isError};
  render();
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ toastMsg = null; render(); }, 2600);
}
  
function totalStock(item){ return item.colors ? item.colors.reduce((s,c)=>s+c.qty,0) : 0; }
function lowStockCount(){
  return state.items.filter(i => totalStock(i) <= 5).length;
}
  
function thumbHtml(item, size){
  size = size || 56;
  if(item && item.image){
    return `<img class="thumb" style="width:${size}px;height:${size}px" src="${item.image}" alt="${esc(item.name)}">`;
  }
  const initial = ((item && item.name) || '?').trim().charAt(0).toUpperCase() || '?';
  return `<div class="thumb-placeholder" style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.4)}px">${initial}</div>`;
}
  
function resizeImage(file, maxDim, quality){
  maxDim = maxDim || 480; quality = quality || 0.72;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > h){ if(w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; } }
        else { if(h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('image load failed'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('file read failed'));
    reader.readAsDataURL(file);
  });
}

function groupColors(colors) {
  const groups = {};
  if (!colors) return [];
  colors.forEach(c => {
    const key = `${c.name}_${c.hex}`;
    if (!groups[key]) {
      groups[key] = { name: c.name, hex: c.hex, sizes: {} };
    }
    groups[key].sizes[c.size || 'Free size'] = c.qty;
  });
  return Object.values(groups);
}

function renderAddedSizeRow(size, qty) {
  return `
    <div class="added-size-row" data-size="${size}">
      <span class="added-size-name">${size}</span>
      <input type="number" class="c-size-qty" min="0" placeholder="Quantity" value="${qty !== undefined ? qty : 0}">
      <button type="button" class="link remove-size-row" style="color:var(--danger); margin-left:auto;">Remove</button>
    </div>
  `;
}

function renderDropdownOptions(sizeType, existingSizes) {
  const allSizes = sizeType === 'denim' ? DENIM_SIZES : REGULAR_SIZES;
  const filtered = allSizes.filter(s => !existingSizes.includes(s));
  
  let html = `<option value="" disabled selected>+ Add Size Variant</option>`;
  filtered.forEach(s => {
    html += `<option value="${s}">${s}</option>`;
  });
  return html;
}

// ---------- RENDER ----------
function render(){
  const app = document.getElementById('app');
  if(!state.ready){ app.innerHTML = '<div class="loading">Loading cloud inventory sync…</div>'; return; }
  
  let html = `
    <div class="brandbar">
      <input class="brand-name" id="brandInput" value="${esc(state.brand)}" />
    </div>
    <div class="tagline">Cloud connected stock tracker — changes sync immediately for all devices</div>
  
    <nav class="tabs">
      <button data-tab="inventory" class="${state.tab==='inventory'?'active':''}">Inventory
        ${lowStockCount()>0 ? `<span class="badge">${lowStockCount()}</span>` : ''}
      </button>
      <button data-tab="add" class="${state.tab==='add'?'active':''}">Add New Item</button>
      <button data-tab="log" class="${state.tab==='log'?'active':''}">Sales Log</button>
    </nav>
  `;
  
  if(state.tab === 'inventory') html += renderInventory();
  if(state.tab === 'add') html += renderAddForm();
  if(state.tab === 'log') html += renderLog();
  
  html += `<div class="footer-note">Realtime backend connection configured. <button class="link" id="resetBtn">Reset cloud database</button></div>`;
  
  app.innerHTML = html;
  attachHandlers();
  
  if(modal) renderModal();
  if(toastMsg){
    const t = document.createElement('div');
    t.className = 'toast' + (toastMsg.isError ? ' error' : '');
    t.textContent = toastMsg.msg;
    document.body.appendChild(t);
  }
}
  
function renderInventory(){
  const q = state.search.trim().toLowerCase();
  const items = state.items.filter(i => i.name && i.name.toLowerCase().includes(q));
  
  let html = `<div class="toolbar">
      <input type="search" class="search" id="searchInput" placeholder="Search items…" value="${esc(state.search)}" />
      <button class="ghost" id="refreshBtn">🔄 Force Sync</button>
    </div>`;
  
  if(state.items.length === 0){
    html += `<div class="empty"><h3>No stock yet</h3><p>Add your first item to start tracking what's available.</p></div>`;
    return html;
  }
  
  html += '<div class="grid" id="inventoryGrid">';
  if(items.length === 0){
    html += `<div class="empty" id="noMatchesMsg"><h3>No matches</h3><p>Try a different search term.</p></div>`;
  } else {
    for(const item of items){
      const total = totalStock(item);
      const colorGroups = groupColors(item.colors);
      
      html += `<div class="card" data-item-name="${esc(item.name.toLowerCase())}">
        <div class="card-head">
          ${thumbHtml(item, 56)}
          <div style="flex:1;min-width:0">
            <div class="item-name">${esc(item.name)}</div>
            <div class="price-tag" style="margin-top:4px">Rs. ${Number(item.price).toLocaleString()}</div>
          </div>
        </div>
        <div class="total-stock">Total available: <b>${total}</b> piece${total===1?'':'s'}</div>
        
        <div class="card-swatches">
          ${colorGroups.map(g => `
            <div class="swatch-wrapper" title="${esc(g.name)}">
              <span class="swatch-dot" style="background:${esc(g.hex)}"></span>
              <span>${esc(g.name)}</span>
            </div>
          `).join('')}
        </div>

        <button type="button" class="breakdown-toggle-btn" data-target="breakdown-${item.id}">
          Stock Breakdown
        </button>
        <div class="breakdown-panel" id="breakdown-${item.id}">
          ${colorGroups.map(g => `
            <div class="breakdown-row">
              <span style="display:flex; align-items:center; font-weight:600;">
                <span class="dot" style="background:${esc(g.hex)}"></span>${esc(g.name)}
              </span>
              <span style="font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--ink-soft);">
                ${Object.entries(g.sizes).map(([sz, qty]) => `${sz}:<b>${qty}</b>`).join(', ')}
              </span>
            </div>
          `).join('')}
        </div>

        <div class="card-actions">
          <button class="primary" data-action="sell" data-id="${item.id}" ${total===0?'disabled':''}>Sell</button>
          <button class="ghost" data-action="restock" data-id="${item.id}">Restock</button>
          <button class="ghost" data-action="edit" data-id="${item.id}">Edit</button>
          <button class="ghost" data-action="delete" data-id="${item.id}">Delete</button>
        </div>
      </div>`;
    }
  }
  html += '</div>';
  return html;
}
  
function renderAddForm(){
  const editItem = state._editingId ? state.items.find(i=>i.id===state._editingId) : null;
  const isEdit = !!editItem;
  
  const defaultGroup = [{name:'', hex:'#1f6f5c', sizes: {}}];
  const colorGroups = editItem ? groupColors(editItem.colors) : defaultGroup;
  const sizeType = editItem ? editItem.sizeType : 'regular';
  const name = editItem ? editItem.name : '';
  const price = editItem ? editItem.price : '';
  
  const previewImage = state._removePhoto ? null : (state._pendingImage || (editItem && editItem.image));
  
  let html = `<div class="form-card">
    <h3 style="font-family:'Fraunces',Georgia,serif;margin-top:0">${isEdit?'Edit item':'Add a new item'}</h3>
    <div class="field"><label>Item name</label>
      <input type="text" id="f-name" placeholder="e.g. Slim Fit Denim Jeans" value="${esc(name)}"></div>
    <div class="field"><label>Price per piece (Rs.)</label>
      <input type="number" id="f-price" min="0" step="1" placeholder="e.g. 1500" value="${price}"></div>
    
    <div class="field"><label>Item Type (For Sizing Options)</label>
      <select id="f-sizeType">
        <option value="regular" ${sizeType==='regular'?'selected':''}>Regular Clothing (S, M, L, XL...)</option>
        <option value="denim" ${sizeType==='denim'?'selected':''}>Denim / Jeans (28, 30, 32...)</option>
      </select>
    </div>

    <div class="field">
      <label>Photo</label>
      <div class="photo-row">
        <div id="imgPreviewWrap">
          ${previewImage
            ? `<img id="imgPreview" src="${previewImage}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--line)">`
            : `<div id="imgPreview" style="width:80px;height:80px;border-radius:8px;background:#f2f0eb;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:11px;text-align:center;padding:4px">No photo</div>`}
        </div>
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <input type="file" accept="image/*" id="f-image-file">
          ${previewImage ? `<div><button type="button" class="ghost" style="padding: 4px 10px; font-size: 12px;" id="removePhoto">Remove photo</button></div>` : ''}
        </div>
      </div>
    </div>

    <div class="field"><label>Colors &amp; Stock Levels</label>
      <div id="colorGroupsWrap">`;
  
  colorGroups.forEach((group, gIdx)=>{
    const existingSizesArray = Object.keys(group.sizes);
    
    html += `
    <div class="color-group" data-idx="${gIdx}">
      <div class="color-group-header">
        <input type="color" class="g-hex" value="${esc(group.hex)}">
        <input type="text" class="g-name" placeholder="Color Name (e.g. Royal Blue)" value="${esc(group.name)}">
        <button type="button" class="ghost remove-color-group">✕ Remove Color</button>
      </div>
      
      <div class="size-adder-row">
        <span style="font-size: 12px; font-weight: 600; color: var(--ink-soft);">Add Size Variant:</span>
        <select class="size-dropdown-selector">
          ${renderDropdownOptions(sizeType, existingSizesArray)}
        </select>
      </div>

      <div class="added-sizes-list">
        ${existingSizesArray.map(sz => renderAddedSizeRow(sz, group.sizes[sz])).join('')}
      </div>
    </div>`;
  });
  
  html += `</div>
      <button type="button" class="link" id="addColorGroup">+ Add Another Color</button>
    </div>
    <div class="form-actions">
      <button class="primary" id="saveItemBtn">${isEdit?'Save changes':'Add to inventory'}</button>
      <button class="ghost" id="cancelFormBtn">Cancel</button>
    </div>
  </div>`;
  return html;
}
  
function renderLog(){
  if(state.log.length === 0){
    return `<div class="empty"><h3>No sales yet</h3><p>Confirmed sales will show up here.</p></div>`;
  }
  const revenue = state.log.reduce((s,l)=>s + l.qty*l.price, 0);
  let html = `<div class="toolbar"><div class="total-stock">Total sales revenue: <b>Rs. ${revenue.toLocaleString()}</b> across ${state.log.length} order${state.log.length===1?'':'s'}</div></div>`;
  html += `<div class="log-wrap"><table><thead><tr>
      <th>Date</th><th>Item</th><th>Colour & Size</th><th>Qty</th><th>Price ea.</th><th>Total</th><th>Buyer</th>
    </tr></thead><tbody>`;
  [...state.log].reverse().forEach(l=>{
    const d = new Date(l.time);
    html += `<tr><td>${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</td>
      <td>${esc(l.item)}</td><td>${esc(l.color)}</td><td>${l.qty}</td>
      <td>Rs. ${Number(l.price).toLocaleString()}</td><td>Rs. ${(l.qty*l.price).toLocaleString()}</td>
      <td>${esc(l.buyer)||'—'}</td></tr>`;
  });
  html += '</tbody></table></div>';
  return html;
}
  
function renderModal(){
  const item = modal.item;
  const wrap = document.createElement('div');
  wrap.className = 'overlay';
  wrap.id = 'overlay';
  
  if(modal.type === 'sell'){
    const colorGroups = groupColors(item.colors).filter(g => {
      return Object.values(g.sizes).some(qty => qty > 0);
    });

    if(colorGroups.length === 0) {
      wrap.innerHTML = `<div class="modal">
        <div class="modal-title-row">${thumbHtml(item,44)}<h3>Sell — ${esc(item.name)}</h3></div>
        <p class="empty" style="padding: 20px 0;">This item is fully out of stock.</p>
        <div class="form-actions"><button class="ghost" id="closeModal">Close</button></div>
      </div>`;
      document.body.appendChild(wrap);
      document.getElementById('closeModal')?.addEventListener('click', closeModal);
      return;
    }

    // Default selection variables to the first available in-stock color and size
    let selColor = colorGroups[0].name;
    let selSize = Object.keys(colorGroups[0].sizes).find(sz => colorGroups[0].sizes[sz] > 0);

    // Dynamic markup container
    wrap.innerHTML = `<div class="modal" id="modalDynamicContainer"></div>`;
    document.body.appendChild(wrap);

    const container = document.getElementById('modalDynamicContainer');

    const updateSellModalDOM = () => {
      const activeGroup = colorGroups.find(g => g.name === selColor) || colorGroups[0];
      
      container.innerHTML = `
        <div class="modal-title-row">
          ${thumbHtml(item,44)}
          <h3>Sell — ${esc(item.name)}</h3>
        </div>
        <div class="sub">Pick the color and size being bought.</div>
        
        <div class="field">
          <label>1. Select Color</label>
          <div class="modal-swatches">
            ${colorGroups.map(g => `
              <button type="button" class="modal-swatch-btn ${g.name === selColor ? 'active' : ''}" data-color="${esc(g.name)}">
                <span class="swatch-dot" style="background:${esc(g.hex)}"></span>
                ${esc(g.name)}
              </button>
            `).join('')}
          </div>
        </div>

        <div class="field">
          <label>2. Select Size</label>
          <div class="modal-sizes">
            ${Object.entries(activeGroup.sizes).map(([sz, qty]) => {
              const outOfStock = qty <= 0;
              return `
                <button type="button" class="modal-size-btn ${sz === selSize ? 'active' : ''} ${outOfStock ? 'disabled' : ''}" data-size="${esc(sz)}" ${outOfStock ? 'disabled' : ''}>
                  ${esc(sz)}
                  <span class="qty-label">${outOfStock ? 'out' : qty + ' left'}</span>
                </button>
              `;
            }).join('')}
          </div>
        </div>

        <div class="field"><label>Quantity to sell</label><input type="number" id="sellQty" min="1" value="1"></div>
        <div class="field"><label>Buyer / order note (optional)</label><input type="text" id="sellBuyer" placeholder="e.g. walk-in customer"></div>
        <div class="form-actions">
          <button class="primary" id="confirmSell">Confirm sale</button>
          <button class="ghost" id="closeModal">Cancel</button>
        </div>
      `;

      // Attach event listeners back to dynamic elements
      container.querySelectorAll('.modal-swatch-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          selColor = btn.getAttribute('data-color');
          const newGroup = colorGroups.find(g => g.name === selColor);
          // Set default size for new color choice to the first in-stock size
          selSize = Object.keys(newGroup.sizes).find(sz => newGroup.sizes[sz] > 0);
          updateSellModalDOM();
        });
      });

      container.querySelectorAll('.modal-size-btn:not(.disabled)').forEach(btn => {
        btn.addEventListener('click', () => {
          selSize = btn.getAttribute('data-size');
          updateSellModalDOM();
        });
      });

      document.getElementById('closeModal')?.addEventListener('click', closeModal);
      
      document.getElementById('confirmSell')?.addEventListener('click', async () => {
        const qty = parseInt(document.getElementById('sellQty').value, 10);
        const buyer = document.getElementById('sellBuyer').value.trim();
        
        const colorObj = item.colors.find(c => c.name === selColor && (c.size || 'Free size') === selSize);
        
        if(!colorObj) {
          showToast('Invalid color or size picked.', true);
          return;
        }
        if(!qty || qty < 1){ showToast('Enter a valid quantity', true); return; }
        if(qty > colorObj.qty){ showToast(`Only ${colorObj.qty} left — can't sell ${qty}`, true); return; }
        
        colorObj.qty -= qty;
        const logId = uid();
        const saleLogEntry = {
          id: logId, 
          time: Date.now(), 
          item: item.name, 
          color: `${colorObj.name} (${colorObj.size || 'Free size'})`, 
          qty, 
          price: Number(item.price), 
          buyer
        };
        
        await cloudPut(`items/${item.id}`, item);
        await cloudPut(`log/${logId}`, saleLogEntry);
        
        closeModal();
        showToast(`Sold ${qty} × ${colorObj.name} (${colorObj.size || 'Free size'}).`);
        syncFromCloud();
      });
    };

    updateSellModalDOM();
  }

  if(modal.type === 'restock'){
    wrap.innerHTML = `<div class="modal">
      <div class="modal-title-row">${thumbHtml(item,44)}<h3>Restock — ${esc(item.name)}</h3></div>
      <div class="sub">Add pieces to existing variants.</div>
      <div id="restockRows">
        ${item.colors ? item.colors.map((c,idx)=>`
          <div class="color-row" data-idx="${idx}" style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <span class="dot" style="background:${esc(c.hex)};width:12px;height:12px;border-radius:50%;display:inline-block;"></span>
            <input type="text" value="${esc(c.name)} (${esc(c.size || 'Free size')})" disabled style="flex:1">
            <input type="number" class="restock-add" min="0" placeholder="+ add" style="width:80px">
          </div>`).join('') : ''}
      </div>
      <div class="form-actions">
        <button class="primary" id="confirmRestock">Save restock</button>
        <button class="ghost" id="closeModal">Cancel</button>
      </div>
    </div>`;
    document.body.appendChild(wrap);
    document.getElementById('closeModal')?.addEventListener('click', closeModal);
    
    document.getElementById('confirmRestock').addEventListener('click', async ()=>{
      const rows = wrap.querySelectorAll('#restockRows .color-row');
      let changed = false;
      rows.forEach(row=>{
        const idx = parseInt(row.dataset.idx,10);
        const add = parseInt(row.querySelector('.restock-add').value, 10);
        if(add && add > 0){ item.colors[idx].qty += add; changed = true; }
      });
      if(!changed){ showToast('Enter at least one quantity to add', true); return; }
      
      await cloudPut(`items/${item.id}`, item);
      closeModal();
      showToast('Restock saved');
      syncFromCloud();
    });
  }

  wrap.addEventListener('click', e => { if(e.target.id === 'overlay') closeModal(); });
}
  
function closeModal(){
  modal = null;
  document.getElementById('overlay')?.remove();
}
  
// ---------- EVENT HANDLERS ----------
function attachHandlers(){
  document.getElementById('brandInput')?.addEventListener('change', async e=>{
    const newBrand = e.target.value.trim() || 'My Clothing Brand';
    await cloudPut('brand', newBrand);
    state.brand = newBrand;
  });
  
  document.querySelectorAll('nav.tabs button').forEach(b=>{
    b.addEventListener('click', ()=>{
      state.tab = b.dataset.tab;
      if(b.dataset.tab === 'add'){ state._editingId = null; state._pendingImage = null; state._removePhoto = false; }
      render();
    });
  });
  
  document.querySelectorAll('.breakdown-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const targetId = btn.getAttribute('data-target');
      const panel = document.getElementById(targetId);
      if (panel) {
        const isCollapsed = panel.style.display === 'none' || panel.style.display === '';
        panel.style.display = isCollapsed ? 'block' : 'none';
        btn.classList.toggle('expanded', isCollapsed);
      }
    });
  });

  document.getElementById('searchInput')?.addEventListener('input', e=>{
    const query = e.target.value.trim().toLowerCase();
    state.search = e.target.value; 
    
    const cards = document.querySelectorAll('#inventoryGrid .card');
    let visibleCount = 0;
    
    cards.forEach(card => {
      const name = card.getAttribute('data-item-name') || '';
      if (name.includes(query)) {
        card.style.display = 'flex';
        visibleCount++;
      } else {
        card.style.display = 'none';
      }
    });

    let noMatch = document.getElementById('noMatchesMsg');
    if (visibleCount === 0 && cards.length > 0) {
      if(!noMatch) {
        const msg = document.createElement('div');
        msg.className = 'empty';
        msg.id = 'noMatchesMsg';
        msg.innerHTML = `<h3>No matches</h3><p>Try a different search term.</p>`;
        document.getElementById('inventoryGrid').appendChild(msg);
      }
    } else if (noMatch) {
      noMatch.remove();
    }
  });

  document.getElementById('refreshBtn')?.addEventListener('click', ()=>{
    syncFromCloud();
    showToast('Data refreshed');
  });
  
  document.getElementById('resetBtn')?.addEventListener('click', async () => {
    if(confirm('This clears all items and sales history for everyone. Are you sure?')){
      await fetch(`${FIREBASE_DB_URL}.json`, { method: 'DELETE' });
      state.items = []; 
      state.log = []; 
      state.brand = 'My Clothing Brand';
      showToast('Cloud database cleared.');
      syncFromCloud();
    }
  });
  
  document.querySelectorAll('[data-action]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.id;
      const item = state.items.find(i=>i.id===id);
      const action = btn.dataset.action;
      if(action === 'sell'){ modal = {type:'sell', item}; render(); }
      if(action === 'restock'){ modal = {type:'restock', item}; render(); }
      if(action === 'edit'){
        state._editingId = id; state._pendingImage = null; state._removePhoto = false;
        state.tab = 'add'; render();
      }
      if(action === 'delete'){
        if(confirm(`Delete "${item.name}" from inventory? This can't be undone.`)){
          fetch(`${FIREBASE_DB_URL}items/${id}.json`, { method: 'DELETE' }).then(()=>{
            showToast(`Deleted "${item.name}"`);
            syncFromCloud();
          });
        }
      }
    });
  });
  
  const colorGroupsWrap = document.getElementById('colorGroupsWrap');
  if(colorGroupsWrap){
    
    document.getElementById('f-sizeType')?.addEventListener('change', (e) => {
      const type = e.target.value;
      document.querySelectorAll('.color-group').forEach((groupEl) => {
        const dropdown = groupEl.querySelector('.size-dropdown-selector');
        const listRows = groupEl.querySelectorAll('.added-size-row');
        const activeSizes = Array.from(listRows).map(r => r.dataset.size);
        dropdown.innerHTML = renderDropdownOptions(type, activeSizes);
      });
    });

    function attachSizeGroupInteraction(groupEl) {
      const dropdown = groupEl.querySelector('.size-dropdown-selector');
      const containerList = groupEl.querySelector('.added-sizes-list');

      dropdown.addEventListener('change', (e) => {
        const selectedSize = e.target.value;
        if(!selectedSize) return;

        const rowHtml = renderAddedSizeRow(selectedSize, 0);
        containerList.insertAdjacentHTML('beforeend', rowHtml);

        const sizeType = document.getElementById('f-sizeType').value;
        const currentActiveRows = containerList.querySelectorAll('.added-size-row');
        const activeSizes = Array.from(currentActiveRows).map(r => r.dataset.size);
        dropdown.innerHTML = renderDropdownOptions(sizeType, activeSizes);

        const targetRow = containerList.querySelector(`[data-size="${selectedSize}"]`);
        targetRow.querySelector('.c-size-qty').focus();
      });

      containerList.addEventListener('click', (e) => {
        if(e.target.classList.contains('remove-size-row')) {
          const targetRow = e.target.closest('.added-size-row');
          targetRow.remove();

          const sizeType = document.getElementById('f-sizeType').value;
          const currentActiveRows = containerList.querySelectorAll('.added-size-row');
          const activeSizes = Array.from(currentActiveRows).map(r => r.dataset.size);
          dropdown.innerHTML = renderDropdownOptions(sizeType, activeSizes);
        }
      });
    }

    document.querySelectorAll('.color-group').forEach(groupEl => {
      attachSizeGroupInteraction(groupEl);
      
      groupEl.querySelector('.remove-color-group').addEventListener('click', () => {
        if(document.querySelectorAll('.color-group').length > 1) {
          groupEl.remove();
        } else {
          showToast("You must keep at least one color variation.", true);
        }
      });
    });

    document.getElementById('addColorGroup')?.addEventListener('click', ()=>{
      const type = document.getElementById('f-sizeType').value;
      const newIdx = document.querySelectorAll('.color-group').length;
      
      const tempDiv = document.createElement('div');
      tempDiv.className = 'color-group';
      tempDiv.dataset.idx = newIdx;
      tempDiv.innerHTML = `
        <div class="color-group-header">
          <input type="color" class="g-hex" value="#1f6f5c">
          <input type="text" class="g-name" placeholder="Color Name (e.g. Royal Blue)">
          <button type="button" class="ghost remove-color-group">✕ Remove Color</button>
        </div>
        <div class="size-adder-row">
          <span style="font-size: 12px; font-weight: 600; color: var(--ink-soft);">Add Size Variant:</span>
          <select class="size-dropdown-selector">
            ${renderDropdownOptions(type, [])}
          </select>
        </div>
        <div class="added-sizes-list"></div>
      `;
      
      colorGroupsWrap.appendChild(tempDiv);
      attachSizeGroupInteraction(tempDiv);
      
      tempDiv.querySelector('.remove-color-group').addEventListener('click', () => {
        if(document.querySelectorAll('.color-group').length > 1) {
          tempDiv.remove();
        } else {
          showToast("You must keep at least one color variation.", true);
        }
      });
    });
  
    document.getElementById('f-image-file')?.addEventListener('change', async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      try {
        const dataUrl = await resizeImage(file);
        state._pendingImage = dataUrl;
        state._removePhoto = false;
        render();
      } catch(err){ showToast('Could not load that photo', true); }
    });
    
    document.getElementById('removePhoto')?.addEventListener('click', ()=>{
      state._pendingImage = null;
      state._removePhoto = true;
      render();
    });
  
    document.getElementById('cancelFormBtn')?.addEventListener('click', ()=>{
      state._editingId = null; state._pendingImage = null; state._removePhoto = false;
      state.tab = 'inventory'; render();
    });
  
    document.getElementById('saveItemBtn')?.addEventListener('click', async ()=>{
      const nameInput = document.getElementById('f-name');
      const priceInput = document.getElementById('f-price');
      const sizeTypeInput = document.getElementById('f-sizeType');
      
      if(!nameInput || !priceInput || !sizeTypeInput) return;
      
      const name = nameInput.value.trim();
      const price = parseFloat(priceInput.value);
      const sizeType = sizeTypeInput.value;
      
      if(!name){ showToast('Item name is required', true); return; }
      if(isNaN(price) || price < 0){ showToast('Enter a valid price', true); return; }
      
      const colors = [];
      let missingColorName = false;
      let missingSelection = true;

      document.querySelectorAll('.color-group').forEach(groupEl => {
        const colorName = groupEl.querySelector('.g-name').value.trim();
        const hex = groupEl.querySelector('.g-hex').value;
        
        if (!colorName) {
          missingColorName = true;
          return;
        }

        groupEl.querySelectorAll('.added-size-row').forEach(row => {
          missingSelection = false;
          const size = row.dataset.size;
          const qtyVal = parseInt(row.querySelector('.c-size-qty').value, 10);
          colors.push({
            name: colorName,
            hex: hex,
            size: size,
            qty: isNaN(qtyVal) ? 0 : qtyVal
          });
        });
      });

      if(missingColorName) {
        showToast('Please enter a name for all your added colors', true);
        return;
      }
      if(missingSelection) {
        showToast('Please select at least one size variant and quantity for your color groups.', true);
        return;
      }
  
      let image = null;
      if(state._pendingImage) image = state._pendingImage;
      else if(state._editingId && !state._removePhoto){
        const existing = state.items.find(i=>i.id===state._editingId);
        image = existing ? existing.image : null;
      }
  
      const itemId = state._editingId || uid();
      const itemData = {id: itemId, name, price, sizeType, colors, image};
      
      await cloudPut(`items/${itemId}`, itemData);
      showToast(state._editingId ? 'Item updated' : 'Item added to cloud inventory');
      
      state._editingId = null; state._pendingImage = null; state._removePhoto = false;
      state.tab = 'inventory';
      syncFromCloud();
    });
  }
}

setInterval(() => syncFromCloud(true), 8000);
syncFromCloud();
</script>
</body>
</html>
