<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Inventory Management</title>
<style>
  :root {
    --bg: #f4f2ee;
    --card: #ffffff;
    --ink: #1e2420;
    --ink-soft: #5b6660;
    --line: #e3ddd2;
    --accent: #1f6f5c;
    --accent-dark: #164e42;
    --accent-soft: #e7f2ee;
    --gold: #c08a2e;
    --danger: #b5473f;
    --danger-soft: #f6e4e2;
    --amber-soft: #faf0da;
    --amber: #b8862f;
    --radius: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
    padding-bottom: env(safe-area-inset-bottom);
  }
  #app { max-width: 1080px; margin: 0 auto; padding: 16px 14px 48px; }
  .screen { animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) { .screen, .card, .toast { animation: none !important; transition: none !important; } }

  h1,h2,h3 { font-family: 'Fraunces', Georgia, serif; margin: 0; }

  /* ---------- ROLE SELECT ---------- */
  .role-wrap { min-height: 88vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px 10px; }
  .role-brand { font-family: 'Fraunces', Georgia, serif; font-size: 34px; font-weight: 600; margin-bottom: 4px; }
  .role-tag { color: var(--ink-soft); font-size: 14px; margin-bottom: 40px; }
  .role-cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 560px; }
  .role-card {
    flex: 1; min-width: 220px;
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 28px 20px; cursor: pointer; text-align: left;
    display: flex; flex-direction: column; gap: 8px;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .role-card:hover, .role-card:active { transform: translateY(-3px); box-shadow: 0 10px 24px rgba(0,0,0,.06); border-color: var(--accent); }
  .role-card .icon { font-size: 30px; margin-bottom: 4px; }
  .role-card h2 { font-size: 19px; }
  .role-card p { margin: 0; font-size: 13px; color: var(--ink-soft); line-height: 1.5; }

  /* ---------- ADMIN LOGIN ---------- */
  .login-wrap { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 28px 24px; max-width: 340px; width: 100%; text-align: center; }
  .login-card .icon { font-size: 30px; margin-bottom: 8px; }
  .login-card h2 { font-size: 20px; margin-bottom: 6px; }
  .login-card p { color: var(--ink-soft); font-size: 13px; margin: 0 0 18px; }
  .login-card input { width: 100%; text-align: center; letter-spacing: .1em; margin-bottom: 12px; }
  .back-link { display: inline-block; margin-top: 14px; color: var(--ink-soft); font-size: 13px; }

  /* ---------- TOP BAR ---------- */
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
  .brand-name {
    font-family: 'Fraunces', Georgia, serif; font-weight: 600; font-size: 24px;
    border: none; background: none; color: var(--ink); padding: 2px 4px; border-radius: 6px; max-width: 65%;
  }
  .brand-name:focus { outline: 2px solid var(--accent); background: #fff; }
  .brand-static { font-family: 'Fraunces', Georgia, serif; font-weight: 600; font-size: 24px; }
  .role-pill {
    display: inline-flex; align-items: center; gap: 5px;
    border: 1px solid var(--line); background: #fff; border-radius: 20px;
    padding: 7px 13px; font-size: 12.5px; font-weight: 600; color: var(--ink-soft);
    cursor: pointer; white-space: nowrap;
  }
  .role-pill:hover { border-color: var(--accent); color: var(--accent-dark); }
  .tagline { color: var(--ink-soft); font-size: 12.5px; letter-spacing: .02em; margin-bottom: 14px; }

  /* ---------- TABS / CHIPS ---------- */
  nav.tabs {
    display: flex; gap: 4px; margin: 14px 0 18px; border-bottom: 1px solid var(--line);
    position: sticky; top: 0; background: var(--bg); z-index: 5;
    overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  nav.tabs::-webkit-scrollbar { display: none; }
  nav.tabs button {
    border: none; background: none; padding: 12px 14px; font-size: 14.5px; font-weight: 600;
    color: var(--ink-soft); cursor: pointer; border-bottom: 2px solid transparent; font-family: inherit;
    white-space: nowrap; min-height: 44px;
  }
  nav.tabs button.active { color: var(--accent-dark); border-bottom-color: var(--accent); }
  nav.tabs button .badge { background: var(--danger); color: #fff; border-radius: 20px; font-size: 11px; padding: 1px 6px; margin-left: 6px; font-weight: 700; }

  .chip-row { display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
  .chip-row::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; border: 1px solid var(--line); background: #fff; border-radius: 20px;
    padding: 9px 16px; font-size: 13.5px; font-weight: 600; color: var(--ink-soft); cursor: pointer; font-family: inherit;
    min-height: 40px;
  }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ---------- FORM CONTROLS ---------- */
  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  input[type=text], input[type=number], input[type=search], input[type=password], select, textarea {
    border: 1px solid var(--line); border-radius: 9px; padding: 11px 12px; font-size: 16px;
    font-family: inherit; background: #fff; color: var(--ink); min-height: 44px;
  }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .search { flex: 1; min-width: 160px; }

  button { touch-action: manipulation; }
  button.primary {
    background: var(--accent); color: #fff; border: none; border-radius: 9px; padding: 12px 18px;
    font-weight: 600; font-size: 14.5px; cursor: pointer; font-family: inherit; min-height: 44px;
  }
  button.primary:hover { background: var(--accent-dark); }
  button.primary:active { transform: scale(.98); }
  .ghost {
    background: none; border: 1px solid var(--line); border-radius: 9px; padding: 10px 15px;
    font-size: 13.5px; cursor: pointer; color: var(--ink); font-family: inherit; min-height: 44px;
    display: inline-flex; align-items: center; justify-content: center; text-align: center;
  }
  .ghost:hover { border-color: var(--accent); color: var(--accent-dark); }
  button.link {
    background: none; border: none; color: var(--accent); text-decoration: none; font-weight: 600;
    cursor: pointer; font-size: 13px; font-family: inherit; padding: 6px 0;
  }
  button.link:hover { text-decoration: underline; color: var(--accent-dark); }
  button:disabled { opacity: .45; cursor: not-allowed; }

  /* ---------- GRID / CARDS ---------- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  @media (max-width: 480px) { .grid { grid-template-columns: 1fr 1fr; gap: 10px; } }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px; display: flex; flex-direction: column; gap: 10px;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.04); }
  .card-head { display: flex; align-items: center; gap: 12px; }
  .item-name { font-family: 'Fraunces', Georgia, serif; font-size: 13.5px; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-photo { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 10px; cursor: pointer; display: block; }
  .card-photo-placeholder { width: 100%; aspect-ratio: 1 / 1; border-radius: 10px; background: var(--amber-soft); color: var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Fraunces', Georgia, serif; font-weight: 700; font-size: 40px; cursor: pointer; }
  .price-tag {
    font-family: 'IBM Plex Mono', monospace; background: var(--amber-soft); color: var(--gold);
    border: 1px solid #ecd9ad; padding: 3px 8px; border-radius: 20px; font-size: 12px; font-weight: 600;
    white-space: nowrap; display: inline-block; margin-top: 3px;
  }
  .total-stock { font-size: 12.5px; color: var(--ink-soft); }
  .total-stock b { color: var(--ink); }

  .status-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; display: inline-block; width: fit-content; letter-spacing: .02em; }
  .status-in { background: var(--accent-soft); color: var(--accent-dark); }
  .status-low { background: var(--amber-soft); color: var(--amber); }
  .status-out { background: var(--danger-soft); color: var(--danger); }
  .cat-badge { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-soft); }

  .thumb { border-radius: 10px; object-fit: cover; border: 1px solid var(--line); flex-shrink: 0; background: #f2f0eb; cursor: pointer; }
  .thumb-placeholder {
    border-radius: 10px; background: var(--amber-soft); color: var(--gold); display: flex; align-items: center;
    justify-content: center; font-family: 'Fraunces', Georgia, serif; font-weight: 700; flex-shrink: 0; cursor: pointer;
  }

  .breakdown-toggle-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; border-top: 1px solid var(--line); margin-top: 2px; padding-top: 8px; background: none; border-left: none; border-right: none; border-bottom: none; cursor: pointer; color: var(--accent); font-weight: 600; font-size: 12.5px; font-family: inherit; text-align: left; min-height: auto; }
  .breakdown-toggle-btn::after { content: '▾'; font-size: 10px; margin-left: 4px; }
  .breakdown-toggle-btn.expanded::after { content: '▴'; }
  .breakdown-panel { display: none; background: #faf9f6; border-radius: 8px; padding: 8px 12px; font-size: 12.5px; border: 1px solid var(--line); }
  .breakdown-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed var(--line); gap: 8px; }
  .breakdown-row:last-child { border-bottom: none; }

  .card-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: auto; padding-top: 6px; }
  .card-actions button { flex: 1; min-width: 56px; padding: 9px 8px; font-size: 12.5px; }

  .empty { text-align: center; padding: 50px 16px; color: var(--ink-soft); grid-column: 1/-1; }
  .empty h3 { font-family: 'Fraunces', Georgia, serif; color: var(--ink); font-size: 19px; margin-bottom: 6px; }

  /* ---------- ADMIN FORM ---------- */
  .form-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; max-width: 600px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-soft); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
  .field input[type=text], .field input[type=number], .field select { width: 100%; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }

  .color-group { background: #faf9f6; border: 1px solid var(--line); border-radius: 9px; padding: 14px; margin-bottom: 12px; }

  .item-photo-row { display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap; }
  .item-photo-preview { width: 96px; height: 96px; border-radius: 10px; overflow: hidden; background: #fff; border: 1px solid var(--line); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .item-photo-preview img { width: 100%; height: 100%; object-fit: cover; }
  .item-photo-placeholder { color: var(--ink-soft); font-size: 10.5px; text-align: center; line-height: 1.4; }
  .item-photo-actions { display: flex; flex-direction: column; gap: 8px; justify-content: center; }

  .variant-photo-row { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; flex-wrap: wrap; }
  .variant-photo-preview { width: 84px; height: 84px; border-radius: 10px; overflow: hidden; background: #fff; border: 1px solid var(--line); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .variant-photo-preview img { width: 100%; height: 100%; object-fit: cover; }
  .variant-photo-placeholder { color: var(--ink-soft); font-size: 10.5px; text-align: center; line-height: 1.4; }
  .variant-photo-actions { display: flex; flex-direction: column; gap: 8px; justify-content: center; }
  .photo-upload-label { min-width: 130px; }

  .size-chip-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .size-chip { border: 1px solid var(--line); background: #fff; border-radius: 9px; padding: 10px 14px; font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: inherit; color: var(--ink); min-height: 44px; }
  .size-chip.active { background: var(--accent-soft); border-color: var(--accent); padding: 6px 8px 6px 12px; display: inline-flex; align-items: center; gap: 8px; cursor: default; }
  .size-chip-label { font-weight: 700; font-size: 13px; color: var(--accent-dark); }
  .size-chip-stepper { display: flex; align-items: center; gap: 6px; }
  .stepper-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--accent); background: #fff; color: var(--accent-dark); font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1; font-family: inherit; }
  .stepper-btn:active { background: var(--accent-soft); }
  .stepper-qty { min-width: 16px; text-align: center; font-weight: 700; font-size: 13.5px; }

  .form-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .form-actions button { flex: 1; min-width: 140px; }

  /* ---------- MODAL ---------- */
  .overlay { position: fixed; inset: 0; background: rgba(20,20,15,.5); display: flex; align-items: flex-end; justify-content: center; padding: 0; z-index: 50; animation: fadeIn .15s ease; }
  @media (min-width: 620px) { .overlay { align-items: center; padding: 16px; } }
  .modal { background: #fff; border-radius: 18px 18px 0 0; padding: 22px; max-width: 460px; width: 100%; max-height: 92vh; overflow-y: auto; }
  @media (min-width: 620px) { .modal { border-radius: 16px; } }
  .modal h3 { font-family: 'Fraunces', Georgia, serif; margin: 0; font-size: 19px; }
  .modal-title-row { display: flex; gap: 10px; align-items: center; margin-bottom: 4px; }
  .modal .sub { color: var(--ink-soft); font-size: 13px; margin-bottom: 16px; }

  .modal-variant-thumbs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; margin-top: 4px; }
  .modal-variant-thumb { width: 56px; height: 56px; border-radius: 9px; overflow: hidden; border: 2px solid var(--line); padding: 0; cursor: pointer; background: #f2f0eb; }
  .modal-variant-thumb.active { border-color: var(--accent); outline: 2px solid var(--accent); }
  .modal-variant-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .modal-sizes { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; margin-top: 4px; }
  .modal-size-btn { padding: 9px 12px; border: 1px solid var(--line); border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; text-align: center; min-width: 58px; min-height: 44px; color: var(--ink); }
  .modal-size-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal-size-btn.disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; background: #faf9f6; }
  .modal-size-btn .qty-label { display: block; font-size: 10px; font-weight: normal; margin-top: 2px; opacity: 0.7; }
  .modal-size-btn.active .qty-label { opacity: 0.9; }

  /* staff photo viewer */
  .detail-main-image-wrap { width: 100%; border-radius: 12px; overflow: hidden; background: #f2f0eb; touch-action: pan-y; }
  .detail-main-image { width: 100%; max-height: 320px; object-fit: cover; display: block; }
  .detail-main-placeholder { width: 100%; height: 220px; display: flex; align-items: center; justify-content: center; font-family: 'Fraunces', Georgia, serif; font-weight: 700; font-size: 48px; color: var(--gold); background: var(--amber-soft); }
  .detail-thumbs { display: flex; gap: 8px; overflow-x: auto; margin-top: 8px; padding-bottom: 2px; -webkit-overflow-scrolling: touch; }
  .detail-thumb { flex-shrink: 0; width: 54px; height: 54px; border-radius: 8px; overflow: hidden; border: 2px solid transparent; padding: 0; cursor: pointer; background: #f2f0eb; }
  .detail-thumb.active { border-color: var(--accent); }
  .detail-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .detail-size-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .detail-size-chip { border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px; font-size: 12.5px; font-weight: 600; background: #faf9f6; }
  .detail-size-chip.avail { background: var(--accent-soft); color: var(--accent-dark); border-color: var(--accent-soft); }
  .detail-size-chip.out { background: var(--danger-soft); color: var(--danger); border-color: var(--danger-soft); text-decoration: line-through; opacity: .8; }

  .restock-variant-block { margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px dashed var(--line); }
  .restock-variant-block:last-child { border-bottom: none; }
  .restock-variant-head { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13.5px; margin-bottom: 8px; }
  .restock-variant-head img { width: 30px; height: 30px; border-radius: 6px; object-fit: cover; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--ink-soft); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; padding: 9px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  td { padding: 9px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  .log-wrap { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); overflow-x: auto; }

  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--accent-dark); color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 100; box-shadow: 0 6px 20px rgba(0,0,0,.2); max-width: 90vw; text-align: center; animation: toastIn .2s ease; }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
  .toast.error { background: var(--danger); }
  .loading { text-align: center; padding: 60px; color: var(--ink-soft); }
  .footer-note { text-align: center; color: var(--ink-soft); font-size: 12px; margin-top: 30px; }
  .security-note { text-align: center; color: var(--ink-soft); font-size: 11.5px; margin-top: 10px; opacity: .8; }
</style>
</head>
<body>
<div id="app"><div class="loading">Loading cloud inventory sync…</div></div>

<script>
const FIREBASE_DB_URL = "https://clothing-inventory-dc4f3-default-rtdb.asia-southeast1.firebasedatabase.app/";

// Change this to whatever you like — this is a simple front-desk gate, not a real
// security system (anyone who views the page source can see it). It just stops
// casual browsing from turning into casual editing.
const ADMIN_PASSWORD = "admin123";

// Photos are uploaded to Cloudinary (a free image-hosting/CDN service) instead
// of being embedded directly in the database. Only a short link is stored per
// photo, which keeps the database small and fast no matter how many items you
// add, and lets photos load quickly and sharply from a real CDN.
const CLOUDINARY_CLOUD_NAME = "wccuyqql";
const CLOUDINARY_UPLOAD_PRESET = "clothing_inventory";

let state = {
  items: [],
  log: [],
  brand: 'My Clothing Brand',
  ready: false,

  role: null,          // null | 'admin_login' | 'customer' | 'admin'
  tab: 'inventory',     // admin tabs: inventory / add / log

  search: '',
  custCategory: 'all',
  custSize: '',

  _editingId: null,
  _saving: false,
  _loginError: ''
};

let modal = null;
let toastTimer = null;
let lastSyncSnapshot = null;

// Maps a colour-group's gid -> the photo data-URL currently staged for it
// while the Add/Edit form is open. Kept outside `state` and reseeded each
// time the form is opened, and read directly at save time.
let pendingVariantImages = {};
// Staged cover photo for the item as a whole (shown above the colour photos).
let pendingMainImage = null;

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

const REGULAR_SIZES = ['S', 'M', 'L', 'XL', 'XXL', 'XXXL', 'Free size'];
const DENIM_SIZES = ['28', '30', '32', '34', '36', '38', '40'];
const CATEGORIES = [
  { key: 'men', label: 'Men' },
  { key: 'women', label: 'Women' },
  { key: 'unisex', label: 'Unisex' }
];

function esc(s){
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function cloudFetch(path) {
  try {
    const res = await fetch(`${FIREBASE_DB_URL}${path}.json`);
    return await res.json();
  } catch (e) {
    console.error("Fetch error:", e);
    return null;
  }
}

async function cloudPut(path, data) {
  try {
    await fetch(`${FIREBASE_DB_URL}${path}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  } catch (e) {
    showToast('Network error syncing to database', true);
  }
}

// Converts old-format items (colour name + hex, one row per size) into the
// new nested shape: { variantId, image, sizes: {size: qty} }. Anything
// already in the new shape passes through untouched.
function normalizeItem(raw){
  if (!raw) return raw;
  let colors = raw.colors || [];
  if (colors.length && colors[0] && colors[0].variantId === undefined) {
    const groups = {};
    const order = [];
    colors.forEach(c => {
      const key = (c.name || '') + '_' + (c.hex || '');
      // Deterministic ID derived from the colour name/hex — NOT uid(), which
      // is time-based and would generate a different ID on every single
      // fetch, making the item look "changed" every 8 seconds even when
      // nothing actually changed, and defeating the sync flicker fix below.
      if (!groups[key]) { groups[key] = { variantId: 'legacy_' + key.replace(/[^a-zA-Z0-9]/g, '_'), image: raw.image || null, sizes: {} }; order.push(key); }
      groups[key].sizes[c.size || 'Free size'] = c.qty;
    });
    colors = order.map(k => groups[k]);
  }
  return { ...raw, colors };
}

async function syncFromCloud(isBackground = false){
  if (isBackground) {
    // Never let a background refresh overwrite what someone is actively doing.
    const focused = document.activeElement;
    const isTyping = focused && ['INPUT','SELECT','TEXTAREA'].includes(focused.tagName);
    const isEditingForm = state.role === 'admin' && state.tab === 'add';
    if (modal !== null || isTyping || isEditingForm) return;
  }

  const rawItems = await cloudFetch('items');
  const items = [];
  if (rawItems) Object.keys(rawItems).forEach(id => { if (rawItems[id]) items.push(normalizeItem(rawItems[id])); });

  const rawLog = await cloudFetch('log');
  const log = [];
  if (rawLog) Object.keys(rawLog).forEach(id => { if (rawLog[id]) log.push(rawLog[id]); });
  log.sort((a,b) => a.time - b.time);

  const rawBrand = await cloudFetch('brand');
  const brand = typeof rawBrand === 'string' ? rawBrand : 'My Clothing Brand';

  // Skip the redraw entirely if nothing actually changed — this is what was
  // causing the whole screen (and every photo) to flicker every ~8 seconds
  // even when no one had made any changes.
  const snapshot = JSON.stringify({ items, log, brand });
  const changed = snapshot !== lastSyncSnapshot;
  lastSyncSnapshot = snapshot;

  state.items = items;
  state.log = log;
  state.brand = brand;

  const firstLoad = !state.ready;
  state.ready = true;

  if (isBackground && !firstLoad && !changed) return;
  render();
}

function showToast(msg, isError){
  // Toasts are a small standalone element, never a full re-render — a full
  // render() here would rebuild whatever screen is open (including wiping
  // an in-progress Add Item form) just to show a message.
  document.getElementById('toastEl')?.remove();
  const t = document.createElement('div');
  t.id = 'toastEl';
  t.className = 'toast' + (isError ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.remove(); }, 2600);
}

function totalStock(item){
  if (!item.colors) return 0;
  return item.colors.reduce((sum, v) => sum + Object.values(v.sizes || {}).reduce((s,q)=>s+q, 0), 0);

function lowStockCount(){ return state.items.filter(i => totalStock(i) <= 5).length; }

function stockBadgeHtml(item){
  const total = totalStock(item);
  if (total === 0) return `<span class="status-badge status-out">Out of stock</span>`;
  if (total <= 5) return `<span class="status-badge status-low">Low stock</span>`;
  return `<span class="status-badge status-in">In stock</span>`;
}

function catLabel(key){
  const c = CATEGORIES.find(c => c.key === key);
  return c ? c.label : 'Unisex';
}

function itemHasSize(item, size){
  if (!size || !item.colors) return true;
  return item.colors.some(v => v.sizes && v.sizes[size] > 0);
}

function firstImage(item){
  return item.image || (item.colors && item.colors[0] && item.colors[0].image) || null;
}

function aggregateSizes(item){
  const agg = {};
  (item.colors || []).forEach(v => {
    Object.entries(v.sizes || {}).forEach(([sz, qty]) => { agg[sz] = (agg[sz] || 0) + qty; });
  });
  return agg;
}

  return `<div class="thumb-placeholder" style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.4)}px" ${clickable}>${initial}</div>`;
}

function cloudinaryConfigured(){
  return CLOUDINARY_CLOUD_NAME && CLOUDINARY_UPLOAD_PRESET
    && CLOUDINARY_CLOUD_NAME !== 'YOUR_CLOUD_NAME' && CLOUDINARY_UPLOAD_PRESET !== 'YOUR_UNSIGNED_PRESET';
}

// Inserts a Cloudinary transformation (e.g. "w_200,q_auto,f_auto") into a
// stored photo URL so the browser only ever downloads the size it needs —
// a tiny thumbnail in a grid, a bigger image in the detail viewer, etc.
// Older photos saved before Cloudinary was set up are plain base64 data —
// those are returned unchanged since there's nothing to transform.
function cloudinaryUrl(url, transform){
  if (!url || !url.includes('/upload/')) return url;
  return url.replace('/upload/', `/upload/${transform}/`);
}

// Shrinks a raw photo (e.g. a 12MB phone camera shot) down to a sane size
// client-side before it's uploaded, then hands it to Cloudinary. Cloudinary
// stores the full version and serves resized/optimized copies on demand via
// cloudinaryUrl() above — so this pre-resize is just to keep uploads fast
// and save storage, not to control final display quality.
function resizeToBlob(file, maxDim, quality){
  maxDim = maxDim || 1600; quality = quality || 0.9;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h) { if (w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; } }
        else { if (h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('toBlob failed')), 'image/jpeg', quality);
      };
      img.onerror = () => reject(new Error('image load failed'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('file read failed'));
    reader.readAsDataURL(file);
  });
}

async function uploadPhoto(file){
  if (!cloudinaryConfigured()) throw new Error('CLOUDINARY_NOT_CONFIGURED');
  const blob = await resizeToBlob(file);
  const formData = new FormData();
  formData.append('file', blob, 'photo.jpg');
  formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
    method: 'POST',
    body: formData
  });
  if (!res.ok) throw new Error('Upload failed');
  const data = await res.json();
  if (!data.secure_url) throw new Error('Upload failed');
  return data.secure_url;
}

function render(){
  const app = document.getElementById('app');
  if (!state.ready) { app.innerHTML = '<div class="loading">Loading cloud inventory sync…</div>'; return; }

  let html;
  if (state.role === null) html = renderRoleSelect();
  else if (state.role === 'admin_login') html = renderAdminLogin();
  else if (state.role === 'customer') html = renderCustomerApp();
  else html = renderAdminApp();

  app.innerHTML = html;
  attachHandlers();

  if (modal) renderModal();
}

      container.innerHTML = `
        <div class="modal-title-row"><h3>${esc(item.name)}</h3></div>
        <div class="detail-main-image-wrap" id="detailMainImgWrap">
          ${s && s.image ? `<img class="detail-main-image" src="${cloudinaryUrl(s.image, 'w_900,q_auto,f_auto')}" alt="">` : `<div class="detail-main-placeholder">${esc(item.name).charAt(0).toUpperCase() || '?'}</div>`}
        </div>
        ${slides.length > 1 ? `<div class="detail-thumbs">
          ${slides.map((sl,i) => `<button type="button" class="detail-thumb ${i===idx?'active':''}" data-idx="${i}">
            ${sl.image ? `<img src="${cloudinaryUrl(sl.image, 'w_120,q_auto,f_auto,c_fill')}" alt="">` : ''}
          </button>`).join('')}
        </div>` : ''}
        <div style="display:flex; align-items:center; gap:10px; margin:14px 0 4px;">
          <span class="cat-badge">${catLabel(item.category)}</span>
          ${stockBadgeHtml(item)}
        </div>
        <div class="price-tag" style="margin-bottom:6px">Rs. ${Number(item.price).toLocaleString()}</div>
        ${s && s.isMain && item.colors && item.colors.length > 0 ? `<p class="sub" style="margin:4px 0 6px">Total across all colours:</p>` : ''}
        <div class="detail-size-chips">
          ${sizeEntries.length ? sizeEntries.map(([sz,qty]) => `<span class="detail-size-chip ${qty>0?'avail':'out'}">${esc(sz)}${qty>0?` · ${qty} left`:' · out'}</span>`).join('') : '<p class="sub" style="margin:8px 0 0">No size information yet.</p>'}
        </div>
        <div class="form-actions"><button class="ghost" id="closeModal" style="width:100%">Close</button></div>
      `;
      container.querySelectorAll('.detail-thumb').forEach(btn => {
        btn.addEventListener('click', () => { idx = parseInt(btn.dataset.idx, 10); update(); });
      });
      document.getElementById('closeModal')?.addEventListener('click', closeModal);

      const mainWrap = document.getElementById('detailMainImgWrap');
      if (mainWrap && slides.length > 1) {
        let touchStartX = null;
        mainWrap.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
        mainWrap.addEventListener('touchend', e => {
          if (touchStartX === null) return;
          const dx = e.changedTouches[0].clientX - touchStartX;
          if (Math.abs(dx) > 40) {
            idx = dx < 0 ? Math.min(idx+1, slides.length-1) : Math.max(idx-1, 0);
            update();
          }
          touchStartX = null;
        }, {passive:true});
      }
    };
    update();
    wrap.addEventListener('click', e => { if (e.target.id === 'overlay') closeModal(); });
    return;
  }

  if (modal.type === 'sell') {
    const availableVariants = (item.colors || []).filter(v => Object.values(v.sizes||{}).some(q => q > 0));

    if (availableVariants.length === 0) {
      wrap.innerHTML = `<div class="modal">
        <div class="modal-title-row"><h3>Sell — ${esc(item.name)}</h3></div>
        <p class="empty" style="padding: 20px 0;">This item is fully out of stock.</p>
        <div class="form-actions"><button class="ghost" id="closeModal">Close</button></div>
      </div>`;
      document.body.appendChild(wrap);
      document.getElementById('closeModal')?.addEventListener('click', closeModal);
      wrap.addEventListener('click', e => { if (e.target.id === 'overlay') closeModal(); });
      return;
    }

    let selVariantIdx = 0;
    let selSize = Object.keys(availableVariants[0].sizes).find(sz => availableVariants[0].sizes[sz] > 0);

    wrap.innerHTML = `<div class="modal" id="modalDynamicContainer"></div>`;
    document.body.appendChild(wrap);
    const container = document.getElementById('modalDynamicContainer');

    const updateSellModalDOM = () => {
      const variant = availableVariants[selVariantIdx];
      container.innerHTML = `
        <div class="modal-title-row"><h3>Sell — ${esc(item.name)}</h3></div>
        <div class="sub">Pick the colour and size being sold.</div>
        <div class="field">
          <label>1. Select colour</label>
          <div class="modal-variant-thumbs">
            ${availableVariants.map((v,i) => `
              <button type="button" class="modal-variant-thumb ${i===selVariantIdx?'active':''}" data-idx="${i}">
                ${v.image ? `<img src="${cloudinaryUrl(v.image, 'w_120,q_auto,f_auto,c_fill')}" alt="">` : ''}
              </button>
            `).join('')}
          </div>
        </div>
        <div class="field">
          <label>2. Select size</label>
          <div class="modal-sizes">
            ${Object.entries(variant.sizes).map(([sz, qty]) => {
              const outOfStock = qty <= 0;
              return `<button type="button" class="modal-size-btn ${sz===selSize?'active':''} ${outOfStock?'disabled':''}" data-size="${esc(sz)}" ${outOfStock?'disabled':''}>
                ${esc(sz)}<span class="qty-label">${outOfStock?'out':qty+' left'}</span>
              </button>`;
            }).join('')}
          </div>
        </div>
        <div class="field"><label>Quantity to sell</label><input type="number" id="sellQty" min="1" value="1"></div>
        <div class="field"><label>Buyer / order note (optional)</label><input type="text" id="sellBuyer" placeholder="e.g. walk-in customer"></div>
        <div class="form-actions">
          <button class="primary" id="confirmSell">Confirm sale</button>
          <button class="ghost" id="closeModal">Cancel</button>
        </div>
      `;
      container.querySelectorAll('.modal-variant-thumb').forEach(btn => {
        btn.addEventListener('click', () => {
          selVariantIdx = parseInt(btn.dataset.idx, 10);
          const v = availableVariants[selVariantIdx];
          selSize = Object.keys(v.sizes).find(sz => v.sizes[sz] > 0);
          updateSellModalDOM();
        });
      });
      container.querySelectorAll('.modal-size-btn:not(.disabled)').forEach(btn => {
        btn.addEventListener('click', () => { selSize = btn.getAttribute('data-size'); updateSellModalDOM(); });
      });
      document.getElementById('closeModal')?.addEventListener('click', closeModal);
      document.getElementById('confirmSell')?.addEventListener('click', async () => {
        const qty = parseInt(document.getElementById('sellQty').value, 10);
        const buyer = document.getElementById('sellBuyer').value.trim();
        const variant = availableVariants[selVariantIdx];
        const currentQty = variant.sizes[selSize];
        if (!qty || qty < 1) { showToast('Enter a valid quantity', true); return; }
        if (qty > currentQty) { showToast(`Only ${currentQty} left — can't sell ${qty}`, true); return; }
        variant.sizes[selSize] -= qty;
        const colourNum = item.colors.indexOf(variant) + 1;
        const logId = uid();
        const saleLogEntry = { id: logId, time: Date.now(), item: item.name, color: `Colour ${colourNum} (${selSize})`, qty, price: Number(item.price), buyer };
        await cloudPut(`items/${item.id}`, item);
        await cloudPut(`log/${logId}`, saleLogEntry);
        closeModal();
        showToast(`Sold ${qty} × Colour ${colourNum} (${selSize}).`);
        syncFromCloud();
      });
    };
    updateSellModalDOM();
    wrap.addEventListener('click', e => { if (e.target.id === 'overlay') closeModal(); });
  }

  if (modal.type === 'restock') {
    const variants = item.colors || [];
    wrap.innerHTML = `<div class="modal">
      <div class="modal-title-row"><h3>Restock — ${esc(item.name)}</h3></div>
      <div class="sub">Add pieces to existing sizes.</div>
      <div id="restockRows">
        ${variants.map((v, vi) => `
          <div class="restock-variant-block">
            <div class="restock-variant-head">
              ${v.image ? `<img src="${cloudinaryUrl(v.image, 'w_80,q_auto,f_auto,c_fill')}" alt="">` : ''} Colour ${vi+1}
            </div>
            ${Object.keys(v.sizes||{}).map(sz => `
              <div class="color-row" data-vidx="${vi}" data-size="${esc(sz)}" style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
                <input type="text" value="${esc(sz)} — currently ${v.sizes[sz]}" disabled style="flex:1">
                <input type="number" class="restock-add" min="0" placeholder="+ add" style="width:80px">
              </div>
            `).join('')}
          </div>
        `).join('')}
      </div>
      <div class="form-actions">
        <button class="primary" id="confirmRestock">Save restock</button>
        <button class="ghost" id="closeModal">Cancel</button>
      </div>
    </div>`;
    document.body.appendChild(wrap);
    document.getElementById('closeModal')?.addEventListener('click', closeModal);
    wrap.addEventListener('click', e => { if (e.target.id === 'overlay') closeModal(); });
    document.getElementById('confirmRestock').addEventListener('click', async ()=>{
      const rows = wrap.querySelectorAll('#restockRows .color-row');
      let changed = false;
      rows.forEach(row=>{
        const vidx = parseInt(row.dataset.vidx,10);
        const sz = row.dataset.size;
        const add = parseInt(row.querySelector('.restock-add').value, 10);
        if (add && add > 0) { item.colors[vidx].sizes[sz] += add; changed = true; }
      });
      if (!changed) { showToast('Enter at least one quantity to add', true); return; }
      await cloudPut(`items/${item.id}`, item);
      closeModal();
      showToast('Restock saved');
      syncFromCloud();
    });
  }
}

function closeModal(){
  modal = null;
  document.getElementById('overlay')?.remove();
}

// ============================================================
// EVENT HANDLERS
// ============================================================
function attachHandlers(){
  // ---- role select ----
  document.getElementById('pickCustomer')?.addEventListener('click', ()=>{ state.role = 'customer'; render(); });
  document.getElementById('pickAdmin')?.addEventListener('click', ()=>{ state._loginError=''; state.role = 'admin_login'; render(); });
  document.getElementById('backToRoleSelect')?.addEventListener('click', ()=>{ state._loginError=''; state.role = null; render(); });

  const doLogin = () => {
    const val = document.getElementById('adminPassword')?.value || '';
    if (val === ADMIN_PASSWORD) {
      state._loginError = '';
      state.role = 'admin';
      state.tab = 'inventory';
      render();
    } else {
      state._loginError = 'Incorrect password. Try again.';
      render();
    }
  };
  document.getElementById('adminLoginBtn')?.addEventListener('click', doLogin);
  document.getElementById('adminPassword')?.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  document.getElementById('switchToAdmin')?.addEventListener('click', ()=>{ state._loginError=''; state.role = 'admin_login'; render(); });
  document.getElementById('exitAdmin')?.addEventListener('click', ()=>{ state.role = null; state.tab = 'inventory'; state._editingId = null; render(); });

  // ---- staff filters ----
  document.querySelectorAll('.chip[data-cat]').forEach(btn => {
    btn.addEventListener('click', ()=>{ state.custCategory = btn.dataset.cat; render(); });
  });
  document.getElementById('custSearch')?.addEventListener('input', e => {
    const query = e.target.value.trim().toLowerCase();
    state.search = e.target.value;
    const grid = document.getElementById('customerGrid');
    if (!grid) return; // e.g. currently showing the "no stock yet" / "no matches" empty state
    const cards = grid.querySelectorAll('.card[data-item-name]');
    let visibleCount = 0;
    cards.forEach(card => {
      const name = card.getAttribute('data-item-name') || '';
      if (name.includes(query)) { card.style.display = ''; visibleCount++; }
      else { card.style.display = 'none'; }
    });
    let noMatch = document.getElementById('custNoMatches');
    if (visibleCount === 0 && cards.length > 0) {
      if (!noMatch) {
        const msg = document.createElement('div');
        msg.className = 'empty'; msg.id = 'custNoMatches';
        msg.innerHTML = `<h3>No matches</h3><p>Try a different search, category, or size.</p>`;
        grid.appendChild(msg);
      }
    } else if (noMatch) { noMatch.remove(); }
  });
  document.getElementById('custSizeFilter')?.addEventListener('change', e => { state.custSize = e.target.value; render(); });

  // ---- open item photo viewer (staff + admin card thumbnails) ----
  document.querySelectorAll('[data-thumb-id]').forEach(el => {
    el.addEventListener('click', () => {
      const item = state.items.find(i => i.id === el.getAttribute('data-thumb-id'));
      if (item) { modal = { type: 'detail', item }; render(); }
    });
  });

  // ---- admin: brand ----
  document.getElementById('brandInput')?.addEventListener('change', async e=>{
    const newBrand = e.target.value.trim() || 'My Clothing Brand';
    await cloudPut('brand', newBrand);
    state.brand = newBrand;
  });

  // ---- admin: tabs ----
  document.querySelectorAll('nav.tabs button').forEach(b=>{
    b.addEventListener('click', ()=>{
      state.tab = b.dataset.tab;
      if (b.dataset.tab === 'add') state._editingId = null;
      render();
    });
  });

  document.querySelectorAll('.breakdown-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const panel = document.getElementById(btn.getAttribute('data-target'));
      if (panel) {
        const isCollapsed = panel.style.display === 'none' || panel.style.display === '';
        panel.style.display = isCollapsed ? 'block' : 'none';
        btn.classList.toggle('expanded', isCollapsed);
      }
    });
  });

  document.getElementById('searchInput')?.addEventListener('input', e=>{
    const query = e.target.value.trim().toLowerCase();
    state.search = e.target.value;
    const cards = document.querySelectorAll('#inventoryGrid .card');
    let visibleCount = 0;
    cards.forEach(card => {
      const name = card.getAttribute('data-item-name') || '';
      if (name.includes(query)) { card.style.display = 'flex'; visibleCount++; }
      else { card.style.display = 'none'; }
    });
    let noMatch = document.getElementById('noMatchesMsg');
    if (visibleCount === 0 && cards.length > 0) {
      if (!noMatch) {
        const msg = document.createElement('div');
        msg.className = 'empty'; msg.id = 'noMatchesMsg';
        msg.innerHTML = `<h3>No matches</h3><p>Try a different search term.</p>`;
        document.getElementById('inventoryGrid').appendChild(msg);
      }
    } else if (noMatch) { noMatch.remove(); }
  });

  document.getElementById('refreshBtn')?.addEventListener('click', ()=>{ syncFromCloud(); showToast('Data refreshed'); });

  document.getElementById('resetBtn')?.addEventListener('click', async () => {
    if (confirm('This clears all items and sales history for everyone. Are you sure?')) {
      await fetch(`${FIREBASE_DB_URL}.json`, { method: 'DELETE' });
      state.items = []; state.log = []; state.brand = 'My Clothing Brand';
      showToast('Cloud database cleared.');
      syncFromCloud();
    }
  });

  document.querySelectorAll('[data-action]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.id;
      const item = state.items.find(i=>i.id===id);
      const action = btn.dataset.action;
      if (action === 'sell') { modal = {type:'sell', item}; render(); }
      if (action === 'restock') { modal = {type:'restock', item}; render(); }
      if (action === 'edit') { state._editingId = id; state.tab = 'add'; render(); }
      if (action === 'delete') {
        if (confirm(`Delete "${item.name}" from inventory? This can't be undone.`)) {
          fetch(`${FIREBASE_DB_URL}items/${id}.json`, { method: 'DELETE' }).then(()=>{
            showToast(`Deleted "${item.name}"`);
            syncFromCloud();
          });
        }
      }
    });
  });

  // ---- admin: add/edit form ----
  const colorGroupsWrap = document.getElementById('colorGroupsWrap');
  if (colorGroupsWrap) {

    document.getElementById('f-main-image')?.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const preview = document.getElementById('mainPhotoPreview');
      const label = document.querySelector('label[for="f-main-image"]');
      if (preview) preview.innerHTML = `<div class="item-photo-placeholder">Uploading…</div>`;
      if (label) label.textContent = 'Uploading…';
      try {
        pendingMainImage = await uploadPhoto(file);
        if (preview) preview.innerHTML = `<img src="${cloudinaryUrl(pendingMainImage, 'w_200,q_auto,f_auto,c_fill')}" alt="">`;
        if (label) label.textContent = 'Change photo';
        const removeWrap = document.getElementById('removeMainPhotoWrap');
        if (removeWrap) removeWrap.style.display = '';
      } catch (err) {
        if (preview) preview.innerHTML = pendingMainImage ? `<img src="${cloudinaryUrl(pendingMainImage, 'w_200,q_auto,f_auto,c_fill')}" alt="">` : `<div class="item-photo-placeholder">📷<br>No photo</div>`;
        if (label) label.textContent = pendingMainImage ? 'Change photo' : 'Upload photo';
        if (err && err.message === 'CLOUDINARY_NOT_CONFIGURED') showToast('Photo hosting isn\'t set up yet', true);
        else showToast('Could not upload that photo — check your connection and try again', true);
      }
      e.target.value = '';
    });

    document.getElementById('removeMainPhoto')?.addEventListener('click', () => {
      pendingMainImage = null;
      const preview = document.getElementById('mainPhotoPreview');
      if (preview) preview.innerHTML = `<div class="item-photo-placeholder">📷<br>No photo</div>`;
      const label = document.querySelector('label[for="f-main-image"]');
      if (label) label.textContent = 'Upload photo';
      const removeWrap = document.getElementById('removeMainPhotoWrap');
      if (removeWrap) removeWrap.style.display = 'none';
    });

    document.getElementById('f-sizeType')?.addEventListener('change', (e) => {
      const type = e.target.value;
      document.querySelectorAll('.color-group').forEach(groupEl => {
        const grid = groupEl.querySelector('.size-chip-grid');
        grid.outerHTML = sizeChipGridHtml(type, {});
      });
    });

    function attachVariantGroupInteraction(groupEl){
      const gid = groupEl.dataset.gid;

      groupEl.querySelector('.variant-file-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const preview = groupEl.querySelector('.variant-photo-preview');
        const label = groupEl.querySelector('.photo-upload-label');
        preview.innerHTML = `<div class="variant-photo-placeholder">Uploading…</div>`;
        if (label) label.textContent = 'Uploading…';
        try {
          const url = await uploadPhoto(file);
          pendingVariantImages[gid] = url;
          // Update just this group's preview + label — never call render() here.
          preview.innerHTML = `<img src="${cloudinaryUrl(url, 'w_200,q_auto,f_auto,c_fill')}" alt="">`;
          if (label) label.textContent = 'Change photo';
        } catch (err) {
          const existing = pendingVariantImages[gid];
          preview.innerHTML = existing ? `<img src="${cloudinaryUrl(existing, 'w_200,q_auto,f_auto,c_fill')}" alt="">` : `<div class="variant-photo-placeholder">📷<br>No photo</div>`;
          if (label) label.textContent = existing ? 'Change photo' : 'Upload photo';
          if (err && err.message === 'CLOUDINARY_NOT_CONFIGURED') showToast('Photo hosting isn\'t set up yet', true);
          else showToast('Could not upload that photo — check your connection and try again', true);
        }
        e.target.value = '';
      });

      groupEl.querySelector('.size-chip-grid').addEventListener('click', (e) => {
        const plusBtn = e.target.closest('.stepper-btn.plus');
        const minusBtn = e.target.closest('.stepper-btn.minus');
        const inactiveChip = e.target.closest('.size-chip:not(.active)');

        if (plusBtn) {
          const chip = plusBtn.closest('.size-chip');
          const qty = parseInt(chip.dataset.qty, 10) + 1;
          chip.dataset.qty = qty;
          chip.querySelector('.stepper-qty').textContent = qty;
          return;
        }
        if (minusBtn) {
          const chip = minusBtn.closest('.size-chip');
          const qty = parseInt(chip.dataset.qty, 10) - 1;
          if (qty <= 0) chip.outerHTML = inactiveSizeChipHtml(chip.dataset.size);
          else { chip.dataset.qty = qty; chip.querySelector('.stepper-qty').textContent = qty; }
          return;
        }
        if (inactiveChip) { inactiveChip.outerHTML = activeSizeChipHtml(inactiveChip.dataset.size, 1); return; }
      });

      groupEl.querySelector('.remove-color-group').addEventListener('click', () => {
        if (document.querySelectorAll('.color-group').length > 1) {
          delete pendingVariantImages[gid];
          groupEl.remove();
        } else {
          showToast('You must keep at least one colour.', true);
        }
      });
    }

    document.querySelectorAll('.color-group').forEach(attachVariantGroupInteraction);

    document.getElementById('addColorGroup')?.addEventListener('click', ()=>{
      const type = document.getElementById('f-sizeType').value;
      const gid = uid();
      pendingVariantImages[gid] = null;
      const tempDiv = document.createElement('div');
      tempDiv.className = 'color-group';
      tempDiv.dataset.gid = gid;
      tempDiv.innerHTML = colorGroupInnerHtml(gid, type, {}, null);
      colorGroupsWrap.appendChild(tempDiv);
      attachVariantGroupInteraction(tempDiv);
    });

    document.getElementById('cancelFormBtn')?.addEventListener('click', ()=>{
      state._editingId = null;
      pendingVariantImages = {};
      pendingMainImage = null;
      state.tab = 'inventory'; render();
    });

    document.getElementById('saveItemBtn')?.addEventListener('click', async ()=>{
      if (state._saving) return; // prevent double submits
      const nameInput = document.getElementById('f-name');
      const priceInput = document.getElementById('f-price');
      const sizeTypeInput = document.getElementById('f-sizeType');
      const categoryInput = document.getElementById('f-category');
      if (!nameInput || !priceInput || !sizeTypeInput || !categoryInput) return;

      const name = nameInput.value.trim();
      const price = parseFloat(priceInput.value);
      const sizeType = sizeTypeInput.value;
      const category = categoryInput.value;

      if (!name) { showToast('Item name is required', true); nameInput.focus(); return; }
      if (isNaN(price) || price < 0) { showToast('Enter a valid price', true); priceInput.focus(); return; }

      const colors = [];
      let missingPhoto = false;
      let missingSizes = false;

      document.querySelectorAll('.color-group').forEach(groupEl => {
        const gid = groupEl.dataset.gid;
        const image = pendingVariantImages[gid] || null;
        const activeChips = groupEl.querySelectorAll('.size-chip.active');
        const sizes = {};
        activeChips.forEach(chip => { sizes[chip.dataset.size] = parseInt(chip.dataset.qty, 10) || 0; });

        if (!image) missingPhoto = true;
        if (Object.keys(sizes).length === 0) missingSizes = true;
        colors.push({ variantId: gid, image, sizes });
      });

      if (missingPhoto) { showToast('Please add a photo for every colour', true); return; }
      if (missingSizes) { showToast('Please select at least one size for each colour', true); return; }

      const itemId = state._editingId || uid();
      const itemData = { id: itemId, name, price, category, sizeType, image: pendingMainImage || null, colors };

      state._saving = true;
      const btn = document.getElementById('saveItemBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

      await cloudPut(`items/${itemId}`, itemData);
      showToast(state._editingId ? 'Item updated' : 'Item added to cloud inventory');

      state._saving = false;
      state._editingId = null;
      pendingVariantImages = {};
      pendingMainImage = null;
      state.tab = 'inventory';
      syncFromCloud();
    });
  }
}

setInterval(() => syncFromCloud(true), 8000);
syncFromCloud();
</script>
